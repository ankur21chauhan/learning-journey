name: C++ All Files Check

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install g++
      run: sudo apt-get update && sudo apt-get install -y g++

    - name: Compile all C++ files
      run: |
        mkdir -p build
        find C++ -name "*.cpp" -print0 | while IFS= read -r -d '' file; do
          echo "Compiling $file"
          g++ "$file" -o "build/$(basename "${file%.cpp}")" || exit 1
        done
